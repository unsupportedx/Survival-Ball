name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      - name: Install
        run: npm install

      - name: Cap Init
      - name: Install Cordova Resources
        run: npm install -g @capacitor/assets

      - name: Generate Icons
        run: npx capacitor-assets generate --iconBackgroundColor #000000 --iconBackgroundColorDark #000000
        run: npx cap init "Survival Ball" "com.survival.ball" --web-dir www

      - name: Add Android
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Release APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
